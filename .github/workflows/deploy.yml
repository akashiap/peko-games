name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（古いデプロイは進行中でもキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (publish only src/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
