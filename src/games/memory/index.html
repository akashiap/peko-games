<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>しんけいすいじゃく｜ペコせんぱいのミニゲーセン</title>
<meta name="description" content="スマホで遊べる無料の神経衰弱（メモリーゲーム）。ひらがなUIでこどもの記憶力トレーニングにぴったり。">
<meta property="og:type" content="website">
<meta property="og:title" content="しんけいすいじゃく｜ペコせんぱいのミニゲーセン">
<meta property="og:description" content="スマホで遊べる無料のしんけいすいじゃく。こどもの記憶力トレーニングにも！">
<meta property="og:image" content="https://akashiriot.github.io/peko-games/icon/icon-512.png">
<meta property="og:url" content="https://akashiriot.github.io/peko-games/games/memory/">
<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="ペコせんぱいのミニゲーセン">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="しんけいすいじゃく｜ペコせんぱいのミニゲーセン">
<meta name="twitter:description" content="スマホで遊べる無料のしんけいすいじゃく。こどもの記憶力トレーニングにも！">
<meta name="twitter:image" content="https://akashiriot.github.io/peko-games/icon/icon-512.png">
<link rel="stylesheet" href="style.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P72GZWJ98N"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-P72GZWJ98N');
</script>
</head>
<body>
<div id="app">

  <!-- タイトル画面 -->
  <section id="screen-title" class="screen active">
    <div class="title-art">
      <svg class="memory-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="m-card-back" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7ad6c4"/>
            <stop offset="100%" stop-color="#3aa896"/>
          </linearGradient>
          <linearGradient id="m-card-face" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fffdf6"/>
            <stop offset="100%" stop-color="#ffeede"/>
          </linearGradient>
        </defs>
        <ellipse cx="100" cy="184" rx="58" ry="6" fill="rgba(0,0,0,0.18)"/>
        <g transform="translate(54 44) rotate(-10 36 50)">
          <rect x="0" y="0" width="72" height="100" rx="10" fill="url(#m-card-back)" stroke="#1f7a6c" stroke-width="2"/>
          <rect x="6" y="6" width="60" height="88" rx="7" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-dasharray="3 3"/>
          <text x="36" y="60" text-anchor="middle" font-size="36" fill="#fffdf6" font-family="serif" font-weight="800">?</text>
        </g>
        <g transform="translate(96 52) rotate(8 36 50)">
          <rect x="0" y="0" width="72" height="100" rx="10" fill="url(#m-card-face)" stroke="#d8b074" stroke-width="2"/>
          <path d="M36 38 C30 28, 14 30, 18 46 C22 60, 36 70, 36 76 C36 70, 50 60, 54 46 C58 30, 42 28, 36 38 Z"
                fill="#ff7aa2" stroke="#c84672" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="22" cy="22" r="3" fill="#ff7aa2"/>
          <circle cx="50" cy="78" r="3" fill="#ff7aa2"/>
        </g>
      </svg>
    </div>
    <h1 class="title">
      <span class="title-heart left">♥</span>
      <span class="title-text">しんけいすいじゃく</span>
      <span class="title-heart right">♥</span>
    </h1>
    <div class="menu">
      <h2 class="menu-heading">モード選択</h2>
      <div class="mode-buttons">
        <button class="btn mode-btn selected" data-mode="solo">ひとりで</button>
        <button class="btn mode-btn" data-mode="pvp">2人で対戦</button>
      </div>

      <h2 class="menu-heading">むずかしさ  <span id="level-label">ふつう</span></h2>
      <div class="level-buttons">
        <button class="btn level-btn" data-level="easy">かんたん<br><small>4×3</small></button>
        <button class="btn level-btn selected" data-level="normal">ふつう<br><small>4×4</small></button>
        <button class="btn level-btn" data-level="hard">むずかしい<br><small>5×4</small></button>
        <button class="btn level-btn" data-level="extreme">とくべつ<br><small>6×5</small></button>
      </div>

      <button id="btn-start" class="btn btn-primary">スタート</button>

      <label class="sound-toggle">
        <input type="checkbox" id="sound-toggle" checked>
        <span class="sound-toggle-label">効果音</span>
      </label>
    </div>

    <a href="../../" class="btn home-link">トップへもどる</a>

    <p class="copyright">© 2026 ペコ先輩</p>
  </section>

  <!-- 対戦画面 -->
  <section id="screen-game" class="screen">
    <header class="game-header">
      <div class="player-info" id="info-p1">
        <span class="player-mark mark-p1">♥</span>
        <span class="player-label" id="label-p1">あなた</span>
        <span class="player-count" id="count-p1">0</span>
      </div>
      <div class="turn-indicator" id="turn-indicator">あなたの番</div>
      <div class="player-info" id="info-p2">
        <span class="player-mark mark-p2">♣</span>
        <span class="player-label" id="label-p2">2P</span>
        <span class="player-count" id="count-p2">0</span>
      </div>
    </header>

    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>

    <div id="message" class="message"></div>

    <footer class="game-footer">
      <button id="btn-reset" class="btn">リセット</button>
      <button id="btn-back" class="btn">タイトルへ</button>
    </footer>
  </section>

  <!-- 終局画面 -->
  <section id="screen-result" class="screen">
    <div class="result-deco">✿</div>
    <h2 class="result-title" id="result-title">クリア！</h2>
    <div id="result-body" class="result-counts"></div>
    <div class="result-buttons">
      <button id="btn-replay" class="btn btn-primary">もう一度</button>
      <button id="btn-result-back" class="btn">タイトルへ</button>
    </div>
  </section>

</div>
<script src="script.js"></script>
</body>
</html>
