<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>リバーシ｜ペコせんぱいのミニゲーセン</title>
<meta name="description" content="スマホでさくっと遊べる無料リバーシ（オセロ）。CPU対戦・2人対戦に対応、ひらがなUIでこどもも安心。">
<meta property="og:type" content="website">
<meta property="og:title" content="リバーシ｜ペコせんぱいのミニゲーセン">
<meta property="og:description" content="スマホでさくっと遊べる無料リバーシ。CPU対戦も2人対戦もOK！">
<meta property="og:image" content="https://akashiriot.github.io/peko-games/icon/icon-512.png">
<meta property="og:url" content="https://akashiriot.github.io/peko-games/games/reversi/">
<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="ペコせんぱいのミニゲーセン">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="リバーシ｜ペコせんぱいのミニゲーセン">
<meta name="twitter:description" content="スマホでさくっと遊べる無料リバーシ。CPU対戦も2人対戦もOK！">
<meta name="twitter:image" content="https://akashiriot.github.io/peko-games/icon/icon-512.png">
<link rel="stylesheet" href="style.css">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P72GZWJ98N"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-P72GZWJ98N');
</script>
</head>
<body>
<div id="app">

  <!-- タイトル画面 -->
  <section id="screen-title" class="screen active">
    <div class="title-art">
      <svg class="othello-icon" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- 影 -->
        <ellipse cx="100" cy="184" rx="74" ry="8" fill="rgba(0,0,0,0.18)"/>
        <!-- 盤の外枠（濃い茶色） -->
        <rect x="20" y="20" width="160" height="160" rx="14" ry="14"
              fill="#5b3a1f" stroke="#3d2410" stroke-width="2"/>
        <!-- 盤面（緑） -->
        <rect x="30" y="30" width="140" height="140" rx="6" ry="6"
              fill="#1f8a4c"/>
        <rect x="30" y="30" width="140" height="140" rx="6" ry="6"
              fill="url(#boardShade)"/>
        <!-- マス目（4x4 簡略表示） -->
        <g stroke="#0e5c30" stroke-width="1.4">
          <line x1="65"  y1="30" x2="65"  y2="170"/>
          <line x1="100" y1="30" x2="100" y2="170"/>
          <line x1="135" y1="30" x2="135" y2="170"/>
          <line x1="30" y1="65"  x2="170" y2="65"/>
          <line x1="30" y1="100" x2="170" y2="100"/>
          <line x1="30" y1="135" x2="170" y2="135"/>
        </g>
        <!-- 初期配置の4石 -->
        <!-- 左上：白 -->
        <ellipse cx="82.5" cy="84" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>
        <circle cx="82.5" cy="82.5" r="14" fill="#fafafa" stroke="#bcbcbc" stroke-width="1"/>
        <circle cx="82.5" cy="82.5" r="14" fill="url(#whiteShade)"/>
        <!-- 右上：黒 -->
        <ellipse cx="117.5" cy="84" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>
        <circle cx="117.5" cy="82.5" r="14" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
        <circle cx="117.5" cy="82.5" r="14" fill="url(#blackShade)"/>
        <!-- 左下：黒 -->
        <ellipse cx="82.5" cy="119" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>
        <circle cx="82.5" cy="117.5" r="14" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
        <circle cx="82.5" cy="117.5" r="14" fill="url(#blackShade)"/>
        <!-- 右下：白 -->
        <ellipse cx="117.5" cy="119" rx="14" ry="4" fill="rgba(0,0,0,0.25)"/>
        <circle cx="117.5" cy="117.5" r="14" fill="#fafafa" stroke="#bcbcbc" stroke-width="1"/>
        <circle cx="117.5" cy="117.5" r="14" fill="url(#whiteShade)"/>
        <defs>
          <radialGradient id="boardShade" cx="0.3" cy="0.25" r="0.9">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#0e5c30" stop-opacity="0.35"/>
          </radialGradient>
          <radialGradient id="whiteShade" cx="0.3" cy="0.3" r="0.8">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#cfcfcf" stop-opacity="0.4"/>
          </radialGradient>
          <radialGradient id="blackShade" cx="0.3" cy="0.3" r="0.85">
            <stop offset="0%" stop-color="#888" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0"/>
          </radialGradient>
        </defs>
      </svg>
    </div>
    <h1 class="title">
      <span class="title-heart left">♥</span>
      <span class="title-text">リバーシ</span>
      <span class="title-heart right">♥</span>
    </h1>
    <div class="menu">
      <h2 class="menu-heading">モード選択</h2>
      <div class="mode-buttons">
        <button class="btn mode-btn" data-mode="pvp">2人で対戦</button>
        <button class="btn mode-btn" data-mode="cpu">CPUと対戦</button>
      </div>

      <div id="difficulty-area" class="difficulty hidden">
        <h2 class="menu-heading">手番</h2>
        <div class="order-buttons">
          <button class="btn order-btn selected" data-order="first">
            <span class="stone stone-black small"></span>先攻
          </button>
          <button class="btn order-btn" data-order="second">
            <span class="stone stone-white small"></span>後攻
          </button>
        </div>

        <h2 class="menu-heading">難易度  Lv<span id="level-display">3</span></h2>
        <input type="range" id="level-slider" class="level-slider"
               min="1" max="10" step="1" value="3">
        <p class="hint" id="level-hint">弱い</p>
      </div>

      <button id="btn-start" class="btn btn-primary">対戦開始</button>

      <label class="sound-toggle">
        <input type="checkbox" id="sound-toggle" checked>
        <span class="sound-toggle-label">効果音</span>
      </label>
    </div>

    <a href="../../" class="btn home-link">トップへもどる</a>

    <p class="copyright">© 2026 ペコ先輩</p>
  </section>

  <!-- 対戦画面 -->
  <section id="screen-game" class="screen">
    <header class="game-header">
      <div class="player-info" id="info-black">
        <span class="stone stone-black small"></span>
        <span class="player-label">くろ</span>
        <span class="player-count" id="count-black">2</span>
      </div>
      <div class="turn-indicator" id="turn-indicator">くろの番</div>
      <div class="player-info" id="info-white">
        <span class="stone stone-white small"></span>
        <span class="player-label">しろ</span>
        <span class="player-count" id="count-white">2</span>
      </div>
    </header>

    <div class="board-wrap">
      <div id="board" class="board"></div>
      <div id="thinking" class="thinking hidden">思考中...</div>
    </div>

    <div id="message" class="message"></div>

    <footer class="game-footer">
      <button id="btn-reset" class="btn">リセット</button>
      <button id="btn-back" class="btn">タイトルへ</button>
    </footer>
  </section>

  <!-- 終局画面 -->
  <section id="screen-result" class="screen">
    <div class="result-deco">✿</div>
    <h2 class="result-title" id="result-title">終局</h2>
    <div class="result-counts">
      <div class="result-side">
        <span class="stone stone-black"></span>
        <span class="result-num" id="result-black">0</span>
      </div>
      <div class="result-side">
        <span class="stone stone-white"></span>
        <span class="result-num" id="result-white">0</span>
      </div>
    </div>
    <div class="result-buttons">
      <button id="btn-replay" class="btn btn-primary">もう一度</button>
      <button id="btn-result-back" class="btn">タイトルへ</button>
    </div>
  </section>

</div>
<script src="script.js"></script>
</body>
</html>
